name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify CSS and JS
        run: |
          npm install -g lightningcss-cli terser
          lightningcss --minify --source-map assets/css/styles.css -o assets/css/styles.css
          lightningcss --minify --source-map assets/css/work-case-study.css -o assets/css/work-case-study.css
          lightningcss --minify --source-map assets/css/styleguide.css -o assets/css/styleguide.css
          terser assets/js/main.js -o assets/js/main.js --source-map "url='main.js.map'" --compress --mangle

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ssh.suckahs.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host ssh.suckahs.org
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Deploy
        run: ./scripts/deploy-2026.sh
