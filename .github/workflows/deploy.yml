name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ssh.suckahs.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host ssh.suckahs.org
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Deploy
        run: ./scripts/deploy-2026.sh
