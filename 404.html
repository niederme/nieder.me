          const storedTheme = window.localStorage.getItem("nieder.theme");

          if (storedTheme === "light") {
            document.documentElement.dataset.theme = "light";
            document.documentElement.style.colorScheme = "light";

          // Ignore storage access failures and keep the default state.

    <script>
      (() => {
        const quotes = [
          { text: "Not all those who wander are lost.", author: "J.R.R. Tolkien" },
          { text: "If you don’t know where you’re going, you might not get there.", author: "Yogi Berra" },
          { text: "When you come to a fork in the road, take it.", author: "Yogi Berra" },
          { text: "Begin at the beginning.", author: "Lewis Carroll" },
          { text: "I dwell in Possibility.", author: "Emily Dickinson" },
          { text: "The readiness is all.", author: "William Shakespeare" },
          { text: "The rest is silence.", author: "William Shakespeare" },
          { text: "What’s past is prologue.", author: "William Shakespeare" },
          { text: "All’s well that ends well.", author: "William Shakespeare" },
          { text: "Brevity is the soul of wit.", author: "William Shakespeare" },
          { text: "Experience is the name everyone gives to their mistakes.", author: "Oscar Wilde" },
          { text: "The truth is rarely pure and never simple.", author: "Oscar Wilde" },
          { text: "Fate will find a way.", author: "Virgil" },
          { text: "Fortune favors the bold.", author: "Virgil" },
          { text: "The unexamined life is not worth living.", author: "Socrates" },
          { text: "I think, therefore I am.", author: "Rene Descartes" },
          { text: "Dare to be wise; begin!", author: "Horace" },
          { text: "He who has begun has half done.", author: "Horace" },
          { text: "Any fool can make a rule.", author: "Henry David Thoreau" },
          { text: "Nevermore.", author: "Edgar Allan Poe" },
          { text: "A mystery, and a dream.", author: "Edgar Allan Poe" },
          { text: "What dreadful hot weather we have!", author: "Jane Austen" },
          { text: "It keeps one in a continual state of inelegance.", author: "Jane Austen" },
          { text: "There is a crack in everything.", author: "Leonard Cohen" },
          { text: "You do not have to be good.", author: "Mary Oliver" },
        ];
        const quoteTarget = document.querySelector("[data-error-quote]");
        const authorTarget = document.querySelector("[data-error-quote-author]");
        if (!quoteTarget || !authorTarget) return;

        const storageKey = "nieder.404-quote-index";
        let index = 0;
        try {
          const previousIndex = Number.parseInt(window.localStorage.getItem(storageKey), 10);
          index = Number.isFinite(previousIndex)
            ? (previousIndex + 1) % quotes.length
            : Math.floor(Math.random() * quotes.length);
          window.localStorage.setItem(storageKey, String(index));
        } catch (error) {
          index = Math.floor(Math.random() * quotes.length);
        }

        quoteTarget.textContent = quotes[index].text;
        authorTarget.textContent = quotes[index].author;
      })();
    </script>
